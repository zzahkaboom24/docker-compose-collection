volumes:
  gitea_data:
    name: gitea_data
  gitea-mariadb_data:
    name: gitea-mariadb_data

services:
  giteamariadb:
    container_name: GiteaMariaDB
    image: mariadb
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --innodb-file-per-table=1 --skip-innodb-read-only-compressed
    volumes:
      - gitea-mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=gitea
      - MYSQL_USER=gitea_rw
    networks:
      - nginxproxymanager_default

  gitea:
    container_name: Gitea
    image: gitea/gitea:latest
    restart: always
    ports:
      - 3030:3000
      - 222:22
    links:
      - giteamariadb
    volumes:
      - gitea_data:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=mysql
      - GITEA__database__HOST=giteamariadb
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea_rw
      - GITEA__database__PASSWD=${MYSQL_PASSWORD}
    networks:
      - nginxproxymanager_default
      
networks:
  nginxproxymanager_default:
    external: true
    name: nginxproxymanager_default
