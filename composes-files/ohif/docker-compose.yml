volumes:
    ohif_data:
        name: ohif_data
    orthanc-proxy_data:
        name: orthanc-proxy_data
    orthanc_data:
        name: orthanc_data
    orthanc-index:
        name: orthanc-index
    oauth2-proxy_data:
        name: oauth2-proxy_data

services:
    ohif:
        image: ohif/app:latest
        container_name: OpenHealthImagingFoundation
        # volumes:
        #     - ohif_data:/usr/share/nginx/html/
        ports:
            - 3000:80
        restart: always
        environment:
            APP_CONFIG: >-
                window.config = {
                    routerBasename: '/',
                    extensions: [],
                    modes: [],
                    showStudyList: true,
                    dataSources: [{
                        namespace: '@ohif/extension-default.dataSourcesModule.dicomweb',
                        sourceName: 'orthanc',
                        configuration: {
                            friendlyName: 'Orthanc DICOMweb',
                            qidoRoot: '/orthanc/dicom-web',
                            wadoRoot: '/orthanc/dicom-web',
                            wadoUriRoot: '/orthanc/dicom-web',
                            qidoSupportsIncludeField: true,
                            imageRendering: 'wadors',
                            thumbnailRendering: 'wadors',
                            enableStudyLazyLoad: true,
                            supportsFuzzyMatching: true,
                            supportsWildcard: true,
                            singlepart: 'bulk'
                        }
                    }],
                    defaultDataSourceName: 'orthanc'
                };
        depends_on:
            - ohif-orthanc-proxy
        networks:
            - nginxproxymanager_default

    ohif-orthanc-proxy:
        image: nginx:alpine
        container_name: OpenHealthImagingFoundationOrthancProxy
        ports:
            - 8043:80
        volumes:
            - orthanc-proxy_data:/etc/nginx/conf.d/
        command: >
            sh -c "echo 'server {
                listen 80 default_server;
                location /orthanc/ {
                    proxy_pass http://ohif-orthanc:8042;
                    proxy_set_header HOST $$host;
                    proxy_set_header X-Real-IP $$remote_addr;
                    rewrite /orthanc(.*) $$1 break;
                    add_header Access-Control-Allow-Credentials true always;
                    add_header Access-Control-Allow-Headers DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type always;
                    add_header Access-Control-Allow-Methods \"GET, POST, OPTIONS\" always;
                    add_header Access-Control-Allow-Origin * always;
                }
            }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
        depends_on:
            - ohif-orthanc
        restart: always
        networks:
            - nginxproxymanager_default

    ohif-orthanc:
        image: orthancteam/orthanc:latest
        container_name: OpenHealthImagingFoundationOrthanc
        volumes:
            - orthanc_data:/var/lib/orthanc/db/
        environment:
            ORTHANC__NAME: "OHIF in container"
            DICOM_WEB_PLUGIN_ENABLED: "true"
            ORTHANC__DICOM_WEB__PUBLIC_ROOT: "https://ohif.zzahkaboom24.de/orthanc/dicom-web/"
            ORTHANC__ORTHANC_EXPLORER_2__UI_OPTIONS__ENABLE_OPEN_IN_OHIF_VIEWER_3: "true"
            ORTHANC__ORTHANC_EXPLORER_2__UI_OPTIONS__OHIF_VIEWER_3_PUBLIC_ROOT: "https://ohif.zzahkaboom24.de"
            ORTHANC__AUTHENTICATION_ENABLED: "false"
            ORTHANC__POSTGRESQL: '{"Host": "orthanc-index"}'
            VERBOSE_STARTUP: "true"
            VERBOSE_ENABLED: "true"
        # ports:
        #     - 4242:4242
        #     - 8042:8042
        depends_on:
            - orthanc-index
        restart: always
        networks:
            - nginxproxymanager_default

    orthanc-index:
        image: postgres:15
        container_name: OpenHealthImagingFoundationOrthancPostgres
        restart: always
        # ports:
        #     - 5432:5432
        volumes:
            - orthanc-index:/var/lib/postgresql/data
        environment:
            POSTGRES_HOST_AUTH_METHOD: "trust"
        networks:
            - nginxproxymanager_default

    oauth2-proxy:
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
        container_name: OpenHealthImagingFoundationOAuth2Proxy
        restart: always
        ports:
            - 4180:4180
        command: --config /etc/oauth2-proxy/oauth2-proxy.cfg
        volumes:
            - oauth2-proxy_data:/etc/oauth2-proxy/
        networks:
            - nginxproxymanager_default

networks:
    nginxproxymanager_default:
        external: true
        name: nginxproxymanager_default
