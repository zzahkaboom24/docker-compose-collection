volumes:
  forgejo_data:
    name: forgejo_data

services:
  server:
    image: codeberg.org/forgejo/forgejo:15
    container_name: Forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    volumes:
      - forgejo_data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '3000:3000'
      - '222:22'
